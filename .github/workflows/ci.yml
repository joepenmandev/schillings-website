name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install
        run: npm ci
      - name: Install Playwright (Chromium + system deps)
        run: PLAYWRIGHT_BROWSERS_PATH=.pw-browsers npx playwright install chromium --with-deps
      - name: Verify (unit + build + E2E + a11y)
        run: npm run verify
